name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release asset version to build, for example v1.2.6"
        required: false
        type: string
  push:
    tags:
      - "v[0-9].[0-9].[0-9]*"

permissions:
  contents: write

jobs:
  build:
    env:
      RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.version || github.ref_name }}

    strategy:
      matrix:
        include:
          - os: ubuntu-22.04
            platform: linux-x64
          - os: ubuntu-22.04-arm
            platform: linux-arm64
          - os: ubuntu-22.04
            platform: linux-x64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: ubuntu-22.04-arm
            platform: linux-arm64-static
            cmake_extra: -DCMAKE_EXE_LINKER_FLAGS="-static-libgcc -static-libstdc++"
          - os: macos-15
            platform: darwin-x64
            cmake_extra: -DCMAKE_OSX_ARCHITECTURES=x86_64
          - os: macos-15
            platform: darwin-arm64
            cmake_extra: ""

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Configure
        run: cmake -B build -DCMAKE_BUILD_TYPE=Release ${{ matrix.cmake_extra }}

      - name: Build
        run: cmake --build build -j$(nproc 2>/dev/null || sysctl -n hw.logicalcpu)

      - name: Strip and rename artifact
        run: |
          cp build/lazyverilog-lsp \
             "lazyverilog-lsp-${RELEASE_TAG}-${{ matrix.platform }}"
          strip "lazyverilog-lsp-${RELEASE_TAG}-${{ matrix.platform }}"

      - name: Generate checksum
        run: |
          asset="lazyverilog-lsp-${RELEASE_TAG}-${{ matrix.platform }}"
          shasum -a 256 "$asset" > "$asset.sha256"

      - name: Upload checksum artifact
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: lazyverilog-checksum-${{ env.RELEASE_TAG }}-${{ matrix.platform }}
          path: lazyverilog-lsp-${{ env.RELEASE_TAG }}-${{ matrix.platform }}.sha256

      - name: Verify checksum lock
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          asset="lazyverilog-lsp-${RELEASE_TAG}-${{ matrix.platform }}"
          actual="$(awk '{print $1}' "$asset.sha256")"
          python3 - "${RELEASE_TAG}" "${{ matrix.platform }}" "$actual" <<'PY'
          import re
          import sys

          version, platform, actual = sys.argv[1:4]
          with open("lua/lazyverilog/checksums.lua", "r", encoding="utf-8") as f:
              text = f.read()

          version_re = re.compile(
              r'\["' + re.escape(version) + r'"\]\s*=\s*{(?P<body>.*?)\n\s*},',
              re.DOTALL,
          )
          version_match = version_re.search(text)
          if not version_match:
              raise SystemExit(
                  f"missing checksum lock entry for {version}; "
                  "update lua/lazyverilog/checksums.lua before tagging"
              )

          platform_re = re.compile(
              r'\["' + re.escape(platform) + r'"\]\s*=\s*"(?P<digest>[0-9a-fA-F]{64})"'
          )
          platform_match = platform_re.search(version_match.group("body"))
          if not platform_match:
              raise SystemExit(
                  f"missing checksum lock entry for {version} {platform}; "
                  "update lua/lazyverilog/checksums.lua before tagging"
              )

          expected = platform_match.group("digest").lower()
          if actual.lower() != expected:
              raise SystemExit(
                  f"checksum lock mismatch for {version} {platform}: "
                  f"expected {expected}, built {actual.lower()}"
              )

          print(f"checksum lock verified for {version} {platform}: {actual.lower()}")
          PY

      - name: Resolve release notes
        id: notes
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          f="docs/releases/${{ github.ref_name }}.md"
          if [[ -f "$f" ]]; then
            echo "body_path=$f" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            lazyverilog-lsp-${{ env.RELEASE_TAG }}-${{ matrix.platform }}
            lazyverilog-lsp-${{ env.RELEASE_TAG }}-${{ matrix.platform }}.sha256
          body_path: ${{ steps.notes.outputs.body_path }}
          generate_release_notes: ${{ steps.notes.outputs.body_path == '' }}
